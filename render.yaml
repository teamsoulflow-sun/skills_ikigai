services:
  - type: web
    name: soulgrow-diagnostic
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/soulgrow.db
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
